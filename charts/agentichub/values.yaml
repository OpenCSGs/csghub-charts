#################################################################
##  Global Configuration                                       ##
#################################################################
global:
  ## Deployment edition: "ce" (Community) or "ee" (Enterprise)
  edition: "ee"

  ## Gateway configuration
  gateway:
    ## GatewayClass controller that will reconcile Gateway / HTTPRoute resources.
    ## Choose the controller according to the Gateway implementation you use.
    ## Examples:
    ## - gateway.envoyproxy.io/gatewayclass-controller  (Envoy Gateway)
    ## - istio.io/gateway-controller                    (Istio)
    ## - io.cilium/gateway-controller                   (Cilium)
    controllerName: gateway.envoyproxy.io/gatewayclass-controller

    ## Gateway service configuration
    ## type: Service type (LoadBalancer or NodePort)
    ## nodePorts: Optional NodePort mapping (if using NodePort)
    service:
      type: "LoadBalancer"          # Service type: LoadBalancer or NodePort
      nodePorts: {}
        # http: 30080
        # https: 30443
        # gitssh: 30022

    ## Base external domain used to expose CSGHub services
    external:
      domain: "csghub.example.com"  # e.g. csghub.example.com, example.com
      # public: ""                  # Optional public access domain override.
                                    # If empty, the domain will be derived automatically.
                                    # NOTE: When base domain is a second-level domain (e.g. example.com),
                                    # a subdomain (e.g. csghub.example.com) will be used internally
                                    # to avoid overly broad wildcard routing such as *.example.com

      ## AIGateway domain configuration (only effective when bundled with csghub)
      ## When deployed standalone, use aigateway.endpoint to specify the AIGateway URL directly.
      ## Priority: domain > useDomain > default basePath
      ## Examples:
      ##   - domain: "" + useDomain: false → https://<domain>/aigateway (basePath)
      ##   - domain: "" + useDomain: true  → https://aigateway.<base-domain> (auto domain)
      ##   - domain: "ai.example.com"      → https://ai.example.com (custom domain, useDomain ignored)
      aigateway:
        useDomain: false            # Use dedicated domain for AIGateway (aigateway.<base-domain>)
                                    # When false and domain is not set, AIGateway uses basePath mode.
        # domain: ""                # Optional custom domain for AIGateway (e.g., "ai.example.com")
                                    # If set, dedicated domain mode is always used regardless of useDomain.

      ## Whether to use the top-level domain directly when generating derived domains.
      ## If the domain is a multi-level domain (e.g. csghub.example.com):
      ## - true:  use the full domain as-is (casdoor.csghub.example.com)
      ## - false: strip the first label and use the base domain (casdoor.example.com)
      ## If the domain is a second-level domain (e.g. example.com),
      ## it will always be used directly without truncation regardless of this setting.
      useTop: false

    ## TLS/SSL configuration for Gateway
    tls:
      enabled: false                # Enable TLS termination on the Gateway
      # secretName: ""              # Kubernetes TLS secret name (required if TLS is enabled)

  ## Image management
  image:
    registry: "docker.io"           # Image global registry, opencsg-registry.cn-beijing.cr.aliyuncs.com for mainland
    registryPolicy: "default"       # default or force, force will overwrite all others registries
    tag: "latest"                   # Image tag format: {{version}}-{{edition}}
    pullPolicy: "IfNotPresent"      # Image pull policy: Always, IfNotPresent, Never
    pullSecrets: []                 # Private registry authentication secrets

  ## Persistent volume configuration
  persistence:
    # storageClass: ""              # StorageClass name (empty for default)
    accessModes: ["ReadWriteOnce"]  # Volume access modes
    size: "10Gi"                    # Default storage capacity

  ## Database configuration
  postgresql:
    ## Use built-in (true) or external (false)
    enabled: true
    ## External PostgreSQL connection
    external: {}
      # host: "<pg_host>"           # PostgreSQL host address
      # port: 6432                  # PostgreSQL port
      # user: "csghub"              # Database username
      # password: ""                # Database password
      # timezone: "Etc/UTC"         # Database timezone
      # sslmode: "prefer"           # SSL mode

  ## Redis configuration
  redis:
    ## Use built-in (true) or external (false)
    enabled: true
    ## External Redis configuration
    external: {}
      # host: "<redis_host>"        # Redis server hostname or IP
      # port: 6379                  # Redis port number
      # password: ""                # Redis authentication password

  ## subChart deployment context
  chartContext:
    isBuiltIn: false                # deployed bundled with csghub

#################################################################
##  AgenticHub Configuration                                   ##
#################################################################
## External CSGHub URL for accessing the hub interface
externalUrl: "https://csghub.example.com"

## API token for authenticating with CSGHub API
hubAPIToken: ""

## AIGateway endpoint configuration
## Priority: aigateway.endpoint > global.gateway.external.aigateway
## - For standalone deployment: Set aigateway.endpoint directly
## - For bundled deployment: Use global.gateway.external.aigateway (domain/useDomain)
## - If aigateway.endpoint is set, it overrides all other configurations
aigateway:
  # endpoint: ""               # Full AIGateway URL (e.g., "https://ai.example.com")
                               # When set, takes precedence over global.gateway.external.aigateway

agenticflow:
  image:
    # registry: "docker.io"
    repository: "opencsghq/agenticflow"
    tag: "v0.5.1-ee"
    pullPolicy: "IfNotPresent"
    pullSecrets: []

  ## Service configuration
  service: {}
    # port: 7860

  ## Database configuration
  postgresql: {}
    # host: "<pg_host>"                    # PostgreSQL host address
    # port: 5432                           # PostgreSQL port
    # database: "csghub_agenticflow"       # Database name
    # user: "csghub"                       # Database username
    # password: ""                         # Database password
    # timezone: "Etc/UTC"                  # Database timezone
    # sslmode: "prefer"                    # SSL mode

  ## Redis configuration
  redis: {}
    # host: "<redis_host>"                 # Redis server hostname or IP
    # port: 6379                           # Redis port number
    # password: ""                         # Redis authentication password

  persistence:
    # storageClass: ""                     # StorageClass for dynamic provisioning
    accessModes: ["ReadWriteOnce"]         # Volume access permissions
    size: "20Gi"                           # Disk space allocation

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1024Gi"

