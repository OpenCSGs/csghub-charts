# tests/rbac_test.yaml
suite: Test Runner RBAC
templates:
  - rbac.yaml
release:
  name: runner
  namespace: csghub
tests:
  - it: should create multiple RBAC with global.namespace <> Release.Namespace
    set:
      namespace: "spaces"
      rbac.create: true
    asserts:
      - hasDocuments:
          count: 8
      - exists:
          path: metadata
          docSelector:
            kind: ClusterRole
            name: runner-cluster-reader
        name: ClusterRole should be created
      - exists:
          path: metadata
          docSelector:
            kind: ClusterRoleBinding
            name: runner-cluster-reader
        name: ClusterRoleBinding should be created

  - it: should create multiple RBAC with global.namespace = Release.Namespace
    set:
      namespace: "csghub"
      rbac.create: true
    asserts:
      - hasDocuments:
          count: 6
