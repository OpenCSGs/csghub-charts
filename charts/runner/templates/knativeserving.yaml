{{- $service := include "common.service" . | fromYaml }}
{{- $serviceName := include "common.names.custom" (list . $service.name) }}
{{- $knativeNamespace := include "namespace.knative" . }}
{{- $isOpencsgRegistry := regexMatch "^opencsg-registry" .Values.global.image.registry }}
{{- $knativeRegistry := "" }}
{{- $knativeVersion := "v1.22.0" }}
{{- $kourierVersion := "v1.22.0" }}
{{- if $isOpencsgRegistry }}
{{- $knativeRegistry = printf "%s/opencsghq/knative-releases/knative.dev" .Values.global.image.registry }}
{{- end }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $knativeNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/service: {{ $serviceName }}
    {{- if $service.labels }}
      {{- toYaml $service.labels | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/resource-policy: keep
---
apiVersion: operator.knative.dev/v1beta1
kind: KnativeServing
metadata:
  name: knative-serving
  namespace: {{ $knativeNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/service: {{ $serviceName }}
    {{- if $service.labels }}
      {{- toYaml $service.labels | nindent 4 }}
    {{- end }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    {{- $crd := lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "knativeservings.operator.knative.dev" }}
    {{- if and .Release.IsUpgrade (not $crd) }}
    helm.sh/hook: post-upgrade
    {{- end }}
    {{- if .Release.IsInstall }}
    helm.sh/hook: post-install
    {{- end }}
spec:
  # https://knative.dev/docs/install/operator/configuring-serving-cr/#configuring-the-knative-serving-operator-custom-resource
  version: {{ regexReplaceAll "\\.[0-9]+$" (trimPrefix "v" $knativeVersion) "" | quote }}
  {{- if $isOpencsgRegistry }}
  registry:
    override:
      activator: {{ $knativeRegistry }}/serving/cmd/activator:{{ $knativeVersion }}
      autoscaler: {{ $knativeRegistry }}/serving/cmd/autoscaler:{{ $knativeVersion }}
      controller: {{ $knativeRegistry }}/serving/cmd/controller:{{ $knativeVersion }}
      webhook: {{ $knativeRegistry }}/serving/cmd/webhook:{{ $knativeVersion }}
      autoscaler-hpa: {{ $knativeRegistry }}/serving/cmd/autoscaler-hpa:{{ $knativeVersion }}
      cleanup: {{ $knativeRegistry }}/serving/pkg/cleanup/cmd/cleanup:{{ $knativeVersion }}
      migrate: {{ $knativeRegistry }}/pkg/apiextensions/storageversion/cmd/migrate:{{ $knativeVersion }}
      queue-proxy: {{ $knativeRegistry }}/serving/cmd/queue:{{ $knativeVersion }}
      net-kourier-controller/controller: {{ $knativeRegistry }}/net-kourier/cmd/kourier:{{ $kourierVersion }}
      3scale-kourier-gateway/kourier-gateway: {{ .Values.global.image.registry }}/opencsghq/envoyproxy/envoy:v1.37-latest
  {{- end }}
  ingress:
    kourier:
      enabled: true
    istio:
      enabled: false
  config:
    domain:
      {{ $service.knative.serving.domain }}: ""
    autoscaler:
      enable-scale-to-zero: {{ $service.knative.serving.autoscaler.enableScaleToZero | quote }}
      scale-to-zero-grace-period: {{ $service.knative.serving.autoscaler.scaleToZeroGracePeriod | quote }}
    network:
      ingress-class: kourier.ingress.networking.knative.dev
    features:
      kubernetes.podspec-priorityclassname: "enabled"
      kubernetes.podspec-schedulername: "enabled"
      kubernetes.podspec-affinity: "enabled"
      kubernetes.podspec-nodeselector: "enabled"
      kubernetes.podspec-dnsconfig: "enabled"
      kubernetes.podspec-dnspolicy: "enabled"
      kubernetes.podspec-dryrun: "enabled"
      kubernetes.podspec-fieldref: "enabled"
      kubernetes.podspec-init-containers: "enabled"
      kubernetes.podspec-persistent-volume-claim: "enabled"
      kubernetes.podspec-persistent-volume-write: "enabled"
      kubernetes.podspec-tolerations: "enabled"
      kubernetes.podspec-topologyspreadconstraints: "enabled"
      kubernetes.podspec-volumes-emptydir: "enabled"
      multi-container: "enabled"
      tag-header-based-routing: "enabled"
    deployment:
      {{- $globalRegistry := .Values.global.image.registry | default "" }}
      {{- $privateRegistry := .Values.externalUrl | trimPrefix "https://" | trimPrefix "http://" }}
      {{- $registryList := list (include "common.domain.csghub" .) $privateRegistry $globalRegistry }}
      registries-skipping-tag-resolving: {{ join "," $registryList | trimSuffix "," | quote }}
      {{- if $isOpencsgRegistry }}
      queue-sidecar-image: {{ $knativeRegistry }}/serving/cmd/queue:{{ $knativeVersion }}
      {{- end }}
