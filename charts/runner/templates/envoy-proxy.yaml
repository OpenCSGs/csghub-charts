{{- $gateway := .Values.global.gateway }}
{{- $isEnvoyProxy := regexMatch "envoyproxy" $gateway.controllerName }}
{{- $isOpencsg := regexMatch "^opencsg-registry" .Values.global.image.registry }}
{{- $service := include "common.service" . | fromYaml }}

{{- if and $isEnvoyProxy (not .Values.global.chartContext.isBuiltIn) }}
{{- $serviceName := include "common.names.custom" (list . "envoy-proxy") }}
{{- $gatewayConfig := include "common.gateway.config" (dict "ctx" . "service" dict) | fromYaml }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ $serviceName }}
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
    {{- if $isOpencsg }}
      envoyDeployment:
        container:
          image: {{ .Values.global.image.registry }}/opencsghq/envoyproxy/envoy:distroless-v1.36.4
    {{- else }}
      envoyDeployment: {}
    {{- end }}
      {{- if eq (dig "service" "type" "LoadBalancer" $gateway) "NodePort" }}
      envoyService:
        type: NodePort
        externalTrafficPolicy: Cluster
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - name: http-80
                  port: 80
                  targetPort: 10080
                  nodePort: {{ $gatewayConfig.service.nodePorts.http }}
                {{- if $gatewayConfig.tls.enabled }}
                - name: http-443
                  port: 443
                  targetPort: 10443
                  nodePort: {{ $gatewayConfig.service.nodePorts.https }}
                {{- end }}
                {{- $serverSvc := include "common.service" (dict "ctx" . "service" "server") | fromYaml }}
                {{- $sshPort := dig "gitlabShell" "sshPort" 22 $serverSvc }}
                - name: {{ printf "tcp-%v" $sshPort }}
                  port: {{ $sshPort }}
                  targetPort: {{ if le (len (printf "%v" $sshPort)) 3 }}{{ printf "10%03d" (int $sshPort) }}{{ else }}{{ $sshPort }}{{ end }}
                  nodePort: {{ $gatewayConfig.service.nodePorts.gitssh }}
      {{- end }}
{{- end }}

{{- /* EnvoyProxy for knative gateways (only in gateway-api mode; ClusterIP in builtIn, follows global gateway type in standalone) */}}
{{- $ingressType := $service.knative.serving.ingress | default "gateway-api" }}
{{- if and $isEnvoyProxy (eq $ingressType "gateway-api") }}
{{- $knativeName := include "common.names.custom" (list . "envoy-proxy-knative") }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: {{ $knativeName }}
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    type: Kubernetes
    kubernetes:
    {{- if $isOpencsg }}
      envoyDeployment:
        container:
          image: {{ .Values.global.image.registry }}/opencsghq/envoyproxy/envoy:distroless-v1.36.4
    {{- else }}
      envoyDeployment: {}
    {{- end }}
    {{- if .Values.global.chartContext.isBuiltIn }}
      envoyService:
        name: {{ include "common.names.custom" (list . "envoy-knative") }}
        type: ClusterIP
    {{- else }}
      envoyService:
        name: {{ include "common.names.custom" (list . "envoy-knative") }}
        type: {{ $gateway.service.type }}
    {{- end }}
{{- end }}
