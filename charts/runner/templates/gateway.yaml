{{- $service := include "common.service" . | fromYaml }}
{{- $gatewayConfig := include "common.gateway.config" (dict "ctx" . "service" $service) | fromYaml }}
{{- $ingressType := $service.knative.serving.ingress | default "gateway-api" }}
{{- $gatewayAPI := eq $ingressType "gateway-api" }}
{{- if and $gatewayConfig.enabled (not .Values.global.chartContext.isBuiltIn) }}
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: csghub-gateway
spec:
  controllerName: {{ $gatewayConfig.controllerName }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: listeners
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: csghub-gateway
  {{- if regexMatch "envoyproxy" .Values.global.gateway.controllerName }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ include "common.names.custom" (list . "envoy-proxy") }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    {{- if $gatewayConfig.tls.enabled }}
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $gatewayConfig.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: Same
    {{- end }}
{{- end }}
{{- if and $gatewayAPI $gatewayConfig.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: knative
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: csghub-gateway
  {{- if regexMatch "envoyproxy" .Values.global.gateway.controllerName }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ include "common.names.custom" (list . "envoy-proxy-knative") }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - {{ .Release.Namespace }}
                  - {{ (.Values.runner | default dict).namespace | default "spaces" }}
                  - {{ include "namespace.knative" . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: knative-local
  namespace: {{ .Release.Namespace }}
spec:
  gatewayClassName: csghub-gateway
  {{- if regexMatch "envoyproxy" .Values.global.gateway.controllerName }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: {{ include "common.names.custom" (list . "envoy-proxy-knative-local") }}
  {{- end }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - {{ .Release.Namespace }}
                  - {{ (.Values.runner | default dict).namespace | default "spaces" }}
                  - {{ include "namespace.knative" . }}
{{- end }}
