suite: Test Dataflow Resources
templates:
  - dataflow/configmap.yaml
  - dataflow/httproutes.yaml
  - dataflow/service.yaml
  - dataflow/deployment.yaml
  - dataflow/pvc.yaml
  - dataflow/job.yaml
  - dataflow/configmap-migrations.yaml
release:
  name: csghub
  namespace: csghub
set:
  global:
    gateway:
      external:
        domain: "csghub.example.cn"
      tls:
        enabled: true
        secretName: "test-tls"
      service:
        type: "LoadBalancer"
    image:
      registry: "docker.io"
      registryPolicy: "default"
      pullPolicy: "Never"
      pullSecrets: ["acr-pull-secret"]
    persistence:
      storageClass: "nfs-provisioner"
      accessModes: ["ReadWriteMany"]
      size: "25Gi"
    postgresql:
      enabled: true
    chartContext:
      isBuiltIn: false
  externalUrl: "https://csghub.example.com"
  dataflow:
    name: "dataflow"
    image:
      registry: "docker.io"
      repository: "opencsghq/dataflow"
      tag: "20250930"
      pullPolicy: ""
    service:
      type: "ClusterIP"
      port: 8088
      protocol: TCP
    persistence:
      size: ""
    migrations:
      enabled: true
  postgresql:
    name: "postgresql"
    service:
      port: 5432
tests:
  - it: Should render ConfigMap correctly
    template: dataflow/configmap.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: data["CSGHUB_ENDPOINT"]
          value: "https://csghub.example.com"
      - equal:
          path: data["DATABASE_HOSTNAME"]
          value: "csghub-postgresql"
      - equal:
          path: data["DATABASE_PORT"]
          value: "5432"
      - equal:
          path: data["DATABASE_DB"]
          value: "csghub_dataflow"
      - equal:
          path: data["DATABASE_USERNAME"]
          value: "csghub"
      - matchRegex:
          path: data["DATABASE_PASSWORD"]
          pattern: ".{32}"
      - equal:
          path: data["STUDIO_JUMP_URL"]
          value: "https://label-studio.example.cn"
  - it: Should render ConfigMap correctly with external postgresql
    template: dataflow/configmap.yaml
    set:
      global:
        postgresql:
          enabled: false
        chartContext:
          isBuiltIn: true
      dataflow:
        postgresql:
          host: "10.6.0.10"
          port: 6432
          database: "postgres"
          user: "postgres"
          password: "postgres"
    asserts:
      - equal:
          path: data["CSGHUB_ENDPOINT"]
          value: "https://csghub.example.cn"
      - equal:
          path: data["DATABASE_HOSTNAME"]
          value: "10.6.0.10"
      - equal:
          path: data["DATABASE_PORT"]
          value: "6432"
      - equal:
          path: data["DATABASE_DB"]
          value: "postgres"
      - equal:
          path: data["DATABASE_USERNAME"]
          value: "postgres"
      - matchRegex:
          path: data["DATABASE_PASSWORD"]
          pattern: "postgres"

  - it: Should render httpRoutes correctly
    template: dataflow/httproutes.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "dataflow"
      - contains:
          path: spec.hostnames
          content: "dataflow.example.cn"

  - it: Should render service correctly
    template: dataflow/service.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: spec.selector["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: spec.type
          value: "ClusterIP"
      - equal:
          path: spec.ports[0].port
          value: 8088
      - equal:
          path: spec.ports[0].protocol
          value: "TCP"
      - equal:
          path: spec.ports[0].name
          value: "dataflow"

  - it: Should render deployment with global correctly
    template: dataflow/deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: metadata.annotations["reloader.stakater.com/auto"]
          value: "true"
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "acr-pull-secret"
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/opencsghq/dataflow:20250930"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "Never"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "uvicorn data_server.main:app --host 0.0.0.0 --port 8000"
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8088
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: "csghub-dataflow"

  - it: Should render deployment with local correctly
    template: dataflow/deployment.yaml
    set:
      global:
        image:
          registry: "opencsg-registry.cn-beijing.cr.aliyuncs.com"
          registryPolicy: "force"
      dataflow:
        image:
          pullPolicy: "IfNotPresent"
          pullSecrets: ["docker-pull-secret"]
        persistence:
          storageClass: "hostPath"
          size: "20Gi"
        nodeSelector:
          diskType: ssd
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "docker-pull-secret"
      - equal:
          path: spec.template.spec.containers[0].image
          value: "opencsg-registry.cn-beijing.cr.aliyuncs.com/opencsghq/dataflow:20250930"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "IfNotPresent"
      - equal:
          path: spec.template.spec.nodeSelector.diskType
          value: "ssd"

  - it: Should render PVC correctly
    template: dataflow/pvc.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow"
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: "keep"
      - equal:
          path: spec.accessModes[0]
          value: "ReadWriteOnce"
      - equal:
          path: spec.resources.requests.storage
          value: "25Gi"
      - equal:
          path: spec.storageClassName
          value: "nfs-provisioner"

  - it: Should render PVC with local persistence correctly
    template: dataflow/pvc.yaml
    set:
      dataflow:
        persistence:
          storageClass: "hostPath"
          size: "20Gi"
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: "20Gi"
      - equal:
          path: spec.storageClassName
          value: "hostPath"
      - equal:
          path: spec.accessModes[0]
          value: "ReadWriteOnce"

  - it: Should render migrations Job correctly
    template: dataflow/job.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow-migrations"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "dataflow"
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "0"
      - equal:
          path: spec.activeDeadlineSeconds
          value: 300
      - equal:
          path: spec.backoffLimit
          value: 3
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 300
      - equal:
          path: spec.template.spec.restartPolicy
          value: "OnFailure"
      - equal:
          path: spec.template.spec.containers[0].name
          value: "migrations"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "for sql_file in /scripts/\\*\\.sql"
      - equal:
          path: spec.template.spec.containers[0].env[5].name
          value: "PGSSLMODE"
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: "/scripts"
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: "csghub-dataflow-migrations"

  - it: Should not render migrations Job when disabled
    template: dataflow/job.yaml
    set:
      dataflow:
        migrations:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should render migrations ConfigMap correctly
    template: dataflow/configmap-migrations.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-dataflow-migrations"
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "pre-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-1"
      - isNotEmpty:
          path: data

  - it: Should not render migrations ConfigMap when disabled
    template: dataflow/configmap-migrations.yaml
    set:
      dataflow:
        migrations:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
