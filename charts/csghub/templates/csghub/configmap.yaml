{{- $serviceName := include "common.names.custom" (list . "core") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/service: "core"
    {{- include "common.labels" . | nindent 4 }}
data:
  GIN_MODE: release
  ## Portal Configuration
  {{- $portalSvc := include "common.service" (dict "ctx" . "service" "portal") | fromYaml }}
  {{- $portalS3Config := include "common.s3.config" (dict "ctx" . "service" $portalSvc) | fromYaml }}
  {{- $portalPgConfig := include "common.postgresql.config" (dict "ctx" . "service" $portalSvc) | fromYaml }}
  {{- $portalRedisConfig := include "common.redis.config" (dict "ctx" . "service" $portalSvc) | fromYaml }}
  {{- $IngressConfig := include "common.gateway.config" (dict "ctx" . "service" $portalSvc) | fromYaml }}
  CSGHUB_PORTAL_APP_ENV: "production"
  CSGHUB_PORTAL_ENABLE_HTTPS: {{ dig "tls" "enabled" "false" $IngressConfig | quote }}
  CSGHUB_PORTAL_ON_PREMISE: {{ ternary "false" "true" (eq .Values.global.edition "saas") | quote }}
  CSGHUB_PORTAL_STARHUB_BASE_URL: {{ include "common.endpoint.csghub" . | quote }}
  {{- $data := (lookup "v1" "ConfigMap" .Release.Namespace $serviceName).data | default dict }}
  {{- $apiToken := dig "CSGHUB_PORTAL_STARHUB_API_KEY" (include "csghub.api.token" .) $data }}
  CSGHUB_PORTAL_STARHUB_API_KEY: {{ $apiToken | quote }}
  ## Portal Configuration for Casdoor
  {{- $authorizeAPI := printf "%s/login/oauth/authorize" (include "common.endpoint.casdoor" .) }}
  {{- $redirectURI := printf "redirect_uri=%s/api/v1/callback/casdoor&scope=read&state=casdoor" (include "common.endpoint.csghub" .) }}
  {{- $app := include "csghub.casdoor.client" "CSGHub" | fromYaml }}
  {{- $casdoorClientID := dig "STARHUB_SERVER_CASDOOR_CLIENT_ID" $app.clientId $data }}
  {{- $casdoorClientSecret := dig "STARHUB_SERVER_CASDOOR_CLIENT_SECRET" $app.clientSecret $data }}
  CSGHUB_PORTAL_LOGIN_URL: {{ printf "%s?client_id=%s&response_type=code&%s" $authorizeAPI $casdoorClientID $redirectURI | quote }}
  ## Portal Configuration for PostgreSQL
  CSGHUB_PORTAL_DATABASE_DSN: {{ include "csghub.postgresql.dsn" (dict "ctx" . "service" $portalSvc) | quote }}
  ## Portal Configuration for ObjectStorage Public
  {{- $s3DefaultEndpoint := $portalS3Config.externalEndpoint | trimPrefix "http://" | trimPrefix  "https://" }}
  CSGHUB_PORTAL_S3_ENDPOINT: {{ $s3DefaultEndpoint | trimPrefix "http://" | trimPrefix  "https://" | quote }}
  CSGHUB_PORTAL_S3_ACCESS_KEY_ID: {{ $portalS3Config.accessKey | quote }}
  CSGHUB_PORTAL_S3_ACCESS_KEY_SECRET: {{ $portalS3Config.secretKey | quote }}
  {{- $portalPublicBucketName := include "common.names.custom" (list . (printf "%s-public" $portalSvc.name)) }}
  CSGHUB_PORTAL_S3_BUCKET: {{ dig "objectStore" "bucket" $portalPublicBucketName $portalSvc | quote }}
  CSGHUB_PORTAL_S3_REGION: {{ $portalS3Config.region | quote }}
  CSGHUB_PORTAL_S3_ENABLE_SSL: {{ $portalS3Config.secure | quote }}
  ## Portal Configuration for ObjectStorage Private
  CSGHUB_PORTAL_PRIVATE_S3_ENDPOINT: {{ $s3DefaultEndpoint | quote }}
  CSGHUB_PORTAL_PRIVATE_S3_ACCESS_KEY_ID: {{ $portalS3Config.accessKey | quote }}
  CSGHUB_PORTAL_PRIVATE_S3_ACCESS_KEY_SECRET: {{ $portalS3Config.secretKey | quote }}
  CSGHUB_PORTAL_PRIVATE_S3_BUCKET: {{ $portalS3Config.bucket | quote }}
  CSGHUB_PORTAL_PRIVATE_S3_REGION: {{ $portalS3Config.region | quote }}
  CSGHUB_PORTAL_PRIVATE_S3_ENABLE_SSL: {{ $portalS3Config.secure | quote }}
  ## Portal Configuration for Redis
  CSGHUB_PORTAL_REDIS_ADDR: {{ printf "%s:%v" $portalRedisConfig.host $portalRedisConfig.port | quote }}
  {{- if or (and .Values.global.redis.enabled .Values.redis.requirePass) (and (not .Values.global.redis.enabled) $portalRedisConfig.password) }}
  CSGHUB_PORTAL_REDIS_PASSWORD: {{ $portalRedisConfig.password | quote }}
  {{- end }}
  ## Portal Configuration for AIGateway
  CSGHUB_PORTAL_AI_GATEWAY_HOST: {{ include "common.endpoint.aigateway" . | quote }}

  ## Accounting Configuration
  {{- $accountingSvc := include "common.service" (dict "ctx" . "service" "accounting") | fromYaml }}
  OPENCSG_ACCOUNTING_SERVER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $accountingSvc.name)) | quote }}
  OPENCSG_ACCOUNTING_SERVER_PORT: {{ $accountingSvc | dig "service" "port" 8086 | quote }}
  OPENCSG_ACCOUNTING_CHARGING_ENABLE: "true"
  OPENCSG_ACCOUNTING_MSG_FETCH_TIMEOUTINSEC: "5"
  {{- $natsConfig := include "common.nats.config" . | fromYaml }}
  OPENCSG_ACCOUNTING_NATS_URL: "nats://{{ $natsConfig.user }}:{{ $natsConfig.password }}@{{ $natsConfig.host }}:{{ $natsConfig.port }}"

  ## User Configuration
  {{- $userSvc := include "common.service" (dict "ctx" . "service" "user") | fromYaml }}
  OPENCSG_USER_SERVER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $userSvc.name)) | quote }}
  OPENCSG_USER_SERVER_PORT: {{ $userSvc | dig "service" "port" 8080 | quote }}
  OPENCSG_USER_SERVER_SIGNIN_SUCCESS_REDIRECT_URL: {{ printf "%s/server/callback" (include "common.endpoint.csghub" .) | quote }}

  ## Moderation Configuration
  {{- $aiGatewaySvc := include "common.service" (dict "ctx" . "service" "aigateway") | fromYaml }}
  {{- $moderationSvc := $aiGatewaySvc.moderation }}
  {{- $aiGatewayEndpoint := include "common.endpoint.aigateway" . }}
  {{- $guardModel := "Qwen/Qwen3Guard-Gen-0.6B" }}
  {{- $guardStreamModel := "Qwen/Qwen3Guard-Gen-Stream-0.6B" }}
  {{- if $moderationSvc.enabled }}
  CSGHUB_PORTAL_SENSITIVE_CHECK: "true"
  STARHUB_SERVER_SENSITIVE_CHECK_ENABLE: "true"
  STARHUB_SERVER_SENSITIVE_CHECK_ENDPOINT: {{ $moderationSvc.endpoint | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_ACCESS_KEY_ID: {{ $moderationSvc.accessKeyId | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_ACCESS_KEY_SECRET: {{ $moderationSvc.accessKeySecret | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_REGION: {{ $moderationSvc.region | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_ENABLE_SSL: {{ $moderationSvc.enableSSL | quote }}
  OPENCSG_MODERATION_SERVER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $aiGatewaySvc.name)) | quote }}
  OPENCSG_MODERATION_SERVER_PORT: {{ $moderationSvc | dig "service" "port" 8089 | quote }}
  OPENCSG_AIGATEWAY_MODERATION_BYPASS_SENSITIVE_CHECK: "true"
  STARHUB_SERVER_SENSITIVE_CHECK_CHECK_CHAIN: {{ $moderationSvc.checkChain | default "ac_automaton,mutable_ac_automaton,aliyun_green" | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_STREAM_CHECK_MODE: {{ $moderationSvc.streamCheckMode | default "async" | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_ASYNC_BUFFER_MAX_CHARS: {{ $moderationSvc.asyncBufferMaxChars | default "50" | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_MAX_CONTENT_LENGTH: {{ $moderationSvc.maxContentLength | default "2000" | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_ENABLE: {{ dig "llm" "enabled" "false" $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_ENDPOINT: {{ dig "llm" "endpoint" $aiGatewayEndpoint $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_API_KEY: {{ dig "llm" "apiKey" "" $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_MODEL: {{ dig "llm" "guard" "model" $guardModel $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_ENDPOINT: {{ dig "llm" "guard" "endpoint" $aiGatewayEndpoint $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_HEADERS: {{ dig "llm" "guard" "headers" "" $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_STREAM_MODEL: {{ dig "llm" "guardStream" "model" $guardStreamModel $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_STREAM_ENDPOINT: {{ dig "llm" "guardStream" "endpoint" $aiGatewayEndpoint $moderationSvc | quote }}
  STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_STREAM_HEADERS: {{ dig "llm" "guardStream" "headers" "" $moderationSvc | quote }}
  {{- else }}
  STARHUB_SERVER_SENSITIVE_CHECK_ENABLE: "false"
  OPENCSG_AIGATEWAY_MODERATION_BYPASS_SENSITIVE_CHECK: "false"
  {{- end }}

  ## Server Configuration for Workflow
  {{- $temporalSvc := include "common.service" (dict "ctx" . "service" "temporal") | fromYaml }}
  {{- $temporalHost := include "common.names.custom" (list . $temporalSvc.name) }}
  {{- $temporalPort := $temporalSvc | dig "service" "port" 7233 | toString }}
  OPENCSG_WORKFLOW_SERVER_ENDPOINT: {{ printf "%s:%s" $temporalHost $temporalPort | quote }}
  STARHUB_SERVER_CRON_JOB_SYNC_AS_CLIENT_CRON_EXPRESSION: '*/5 * * * *'

  ## Server Configuration for Dataflow
  {{- $dataflowSvc := include "common.service" (dict "ctx" . "service" "dataflow") | fromYaml }}
  {{- $dataflowConfig := include "common.dataflow.config" (dict "ctx" . "service" $dataflowSvc) | fromYaml }}
  OPENCSG_DATAFLOW_SERVER_HOST: {{ $dataflowConfig.host | quote }}
  OPENCSG_DATAFLOW_SERVER_PORT: {{ $dataflowConfig.port | quote }}

  ## Server Configuration for Dataviewer
  {{- $dataviewerSvc := include "common.service" (dict "ctx" . "service" "dataviewer") | fromYaml }}
  OPENCSG_DATAVIEWER_SERVER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $dataviewerSvc.name)) | quote }}
  OPENCSG_DATAVIEWER_SERVER_PORT: {{ $dataviewerSvc | dig "service" "port" 8093 | quote }}

  {{- if eq .Values.global.edition "saas" }}
  {{- if dig "enabled" true .Values.fedap }}
  ## Server Configuration for Federation Adapter
  {{- $fedapSvc := include "common.service" (dict "ctx" . "service" "fedap") | fromYaml }}
  {{- $fedapSvcName := include "common.names.custom" (list . $fedapSvc.name) }}
  STARHUB_SERVER_FEDERATION_ADAPTER_ENDPOINT: {{ printf "http://%s" $fedapSvcName | quote }}
  STARHUB_SERVER_FEDERATION_ADAPTER_PORT: {{ $fedapSvc | dig "service" "port" 8099 | quote }}
  {{- end }}

  {{- if dig "enabled" true .Values.trustregistry }}
  ## Server Configuration for Federation Registry
  {{- $trustregistrySvc := include "common.service" (dict "ctx" . "service" "trustregistry") | fromYaml }}
  {{- $trustregistrySvcName := include "common.names.custom" (list . $trustregistrySvc.name) }}
  STARHUB_SERVER_FEDERATION_REGISTRY_HOST: {{ printf "http://%s" $trustregistrySvcName | quote }}
  STARHUB_SERVER_FEDERATION_REGISTRY_PORT: {{ $trustregistrySvc | dig "service" "port" 8098 | quote }}
  {{- end }}
  {{- end }}

  ## Server Configuration for Notification
  {{- $notifierSvc := include "common.service" (dict "ctx" . "service" "notifier") | fromYaml }}
  STARHUB_SERVER_NOTIFIER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $notifierSvc.name)) | quote }}
  STARHUB_SERVER_NOTIFIER_PORT: {{ $notifierSvc | dig "service" "port" 8095 | quote }}
  {{- with $notifierSvc.smtp }}
  ## Portal configuration for SMTP
  CSGHUB_PORTAL_MAILER_HOST: {{ .host | quote }}
  CSGHUB_PORTAL_MAILER_PORT: {{ .port | quote }}
  CSGHUB_PORTAL_MAILER_USERNAME: {{ .username | quote }}
  CSGHUB_PORTAL_MAILER_PASSWORD: {{ .password | quote }}
  ## Server configuration for SMTP
  STARHUB_SERVER_MAILER_HOST: {{ .host | quote }}
  STARHUB_SERVER_MAILER_PORT: {{ .port | quote }}
  STARHUB_SERVER_MAILER_USERNAME: {{ .username | quote }}
  STARHUB_SERVER_MAILER_PASSWORD: {{ .password | quote }}
  {{- end }}
  STARHUB_SERVER_REPO_SYNC_TIMEZONE: {{ $notifierSvc.repoSyncTime | default "Asia/Shanghai" | quote }}
  STARHUB_SERVER_NOTIFIER_BROADCAST_USER_PAGE_SIZE: {{ $notifierSvc.broadcastUserPageSize | default 100 | quote }}
  STARHUB_SERVER_NOTIFIER_BROADCAST_EMAIL_PAGE_SIZE: {{ $notifierSvc.broadcastEmailPageSize | default 100 | quote }}
  ### Server Configuration for FeiShu of Notification
  {{- if eq .Values.global.edition "ee" }}
  {{- with $notifierSvc.feiShu }}
  STARHUB_SERVER_FEISHU_APP_ID: {{ .appId | quote }}
  STARHUB_SERVER_FEISHU_APP_SECRET: {{ .appSecret | quote }}
  STARHUB_SERVER_FEISHU_BATCH_SEND_MESSAGE_CRON_EXPRESSION: {{ .batchSendMessageCronExpression | default "*/10 * * * *" | quote }}
  STARHUB_SERVER_FEISHU_MAX_REQUEST_CONTENT_SIZE: {{ .maxRequestContentSize | default 20480 | quote }}
  STARHUB_SERVER_FEISHU_MAX_DELAY_DURATION: {{ .maxDelayDuration | default 3600 | quote }}
  STARHUB_SERVER_FEISHU_CHAT_IDS_CACHE_TTL: {{ .chatIdsCacheTTL | default 21600 | quote }}
  {{- end }}
  {{- end }}

  ## Server Configuration for Skipping LFS Files Validation
  STARHUB_SERVER_SKIP_LFS_FILE_VALIDATION: "true"

  ## Server Configuration for Payment
  {{- $paymentSvc := include "common.service" (dict "ctx" . "service" "payment") | fromYaml }}
  {{- if eq .Values.global.edition "saas" }}
  OPENCSG_PAYMENT_SERVER_IS_PROD: "true"
  OPENCSG_PAYMENT_BILL_BUCKET: {{ $paymentSvc.billingBucket | quote }}
  OPENCSG_PAYMENT_SERVER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $accountingSvc.name)) | quote }}
  OPENCSG_PAYMENT_SERVER_PORT: {{ $paymentSvc | dig "service" "port" 8090 | quote }}
  {{- end }}

  ## Server Configuration for AIGateway
  {{- $aigatewaySvc := $aiGatewaySvc.aigateway }}
  OPENCSG_AIGATEWAY_PORT: {{ $aigatewaySvc | dig "service" "port" 8094 | quote }}
  {{- if ne .Values.global.edition "ce" }}
  OPENCSG_AIGATEWAY_LLMLOG_ENABLE: {{ dig "llm" "log" "enabled" true $aigatewaySvc | quote }}
  OPENCSG_AIGATEWAY_LLM_TRACE_ENABLE: {{ dig "llm" "trace" "enabled" true $aigatewaySvc | quote }}
  OPENCSG_AIGATEWAY_LLM_TRACE_CONTENT_CAPTURE: {{ dig "llm" "trace" "contentCapture" "metadata_only" $aigatewaySvc | quote }}
  OPENCSG_AIGATEWAY_LLM_TRACE_MAX_CONTENT_LENGTH: {{ dig "llm" "trace" "contentLength" "256" $aigatewaySvc | quote }}
  OPENCSG_AIGATEWAY_LLM_TRACE_MAX_INPUT_USER_MESSAGES: {{ dig "llm" "trace" "maxInputUserMessages" "1" $aigatewaySvc | quote }}
  STARHUB_SERVER_LLMLOG_SYNC_ENABLE: {{ dig "llm" "log" "sync" "enabled" false $aigatewaySvc | quote }}
  STARHUB_SERVER_LLMLOG_SYNC_USERNAME: {{ dig "llm" "log" "sync" "username" "" $aigatewaySvc | quote }}
  STARHUB_SERVER_LLMLOG_SYNC_DATASET_NAMESPACE: {{ dig "llm" "log" "sync" "dataset" "namespace" "" $aigatewaySvc | quote }}
  STARHUB_SERVER_LLMLOG_SYNC_DATASET_NAME: {{ dig "llm" "log" "sync" "dataset" "name" "" $aigatewaySvc | quote }}
  STARHUB_SERVER_LLMLOG_SYNC_MAX_SHARD_SIZE_BYTES: {{ dig "llm" "log" "sync" "maxShardSizeBytes" "67108864" $aigatewaySvc | quote }}
  {{- else }}
  OPENCSG_AIGATEWAY_LLMLOG_ENABLE: "false"
  OPENCSG_AIGATEWAY_LLM_TRACE_ENABLE: "false"
  STARHUB_SERVER_LLMLOG_SYNC_ENABLE: "false"
  {{- end }}

  {{- if and (ne .Values.global.edition "ce") (dig "llm" "log" "enabled" true $aigatewaySvc) }}
  ## Server Configuration for LLMLog
  {{- $llmlogSvc := include "common.service" (dict "ctx" . "service" "llmlog") | fromYaml }}
  OPENCSG_LLMLOG_BUCKET: {{ $llmlogSvc.bucket | default "csghub-llmlog" | quote }}
  OPENCSG_LLMLOG_PREFIX: {{ $llmlogSvc.prefix | default "llmlog" | quote }}
  OPENCSG_LLMLOG_WORKER_NUM: {{ $llmlogSvc.workerNum | default 10 | quote }}
  OPENCSG_LLMLOG_BATCH_SIZE: {{ $llmlogSvc.batchSize | default 1000 | quote }}
  OPENCSG_LLMLOG_FLUSH_INTERVAL_SECONDS: {{ $llmlogSvc.flushIntervalSeconds | default 300 | quote }}
  {{- end }}

  ## Server Configuration
  {{- $serverSvc := include "common.service" (dict "ctx" . "service" "server") | fromYaml }}
  {{- $serverS3Config := include "common.s3.config" (dict "ctx" . "service" $serverSvc) | fromYaml }}
  {{- $serverRedisConfig := include "common.redis.config" (dict "ctx" . "service" $serverSvc) | fromYaml }}
  {{- $serverPgConfig := include "common.postgresql.config" (dict "ctx" . "service" $serverSvc) | fromYaml }}
  {{- $serverGitConfig := include "common.gitaly.config" (dict "ctx" . "service" $serverSvc) | fromYaml }}
  STARHUB_SERVER_SAAS: {{ eq .Values.global.edition "saas" | quote }}
  STARHUB_SERVER_ENABLE_HTTPS: {{ dig "tls" "enabled" "false" $IngressConfig | quote }}
  STARHUB_SERVER_MIRRORSERVER_ENABLE: "false"
  STARHUB_SERVER_MIRROR_REMOTE: "false"
  {{- if $serverSvc.mirrorSync }}
  STARHUB_SERVER_MIRROR_MAX_MODEL_REPO_SIZE: {{ $serverSvc.mirrorSync.maxModelRepoSize | quote }}
  STARHUB_SERVER_MIRROR_MAX_DATASET_REPO_SIZE: {{ $serverSvc.mirrorSync.maxDatasetRepoSize | quote }}
  {{- end }}
  STARHUB_SERVER_API_TOKEN: {{ $apiToken | quote }}
  {{- $jwtToken := dig "STARHUB_JWT_SIGNING_KEY" (randNumeric 8 | sha1sum) $data }}
  STARHUB_JWT_SIGNING_KEY: {{ $jwtToken | quote }}

  ## Server Configuration for Model
  {{- $runnerSvc := include "common.service" (dict "ctx" . "service" "runner") | fromYaml }}
  STARHUB_SERVER_MODEL_DEPLOY_TIMEOUT_IN_MINUTES: {{ $runnerSvc.model.deployTimeoutInMin | default 60 | quote }}
  STARHUB_SERVER_MODEL_DOWNLOAD_ENDPOINT: {{ include "common.endpoint.csghub" . | quote }}
  ## Server Configuration for Model
  {{- $registry := or $runnerSvc.model.dockerRegBase .Values.global.image.registry "docker.io" }}
  STARHUB_SERVER_MODEL_DOCKER_REG_BASE: {{ $registry | quote }}
  STARHUB_SERVER_MODEL_DEPLOY_STATUS_CHECK_INTERVAL: {{ $runnerSvc.model.deployStatusCheckInterval | default 10 | quote }}
  STARHUB_SERVER_SPACE_BUILD_TIMEOUT_IN_MINUTES: {{ $serverSvc.space.buildTimeout | default 30 | quote }}

  ## Server Configuration for Multiple-Sync
  STARHUB_SERVER_MULTI_SYNC_ENABLED: {{ $serverSvc.multiSync.enabled | quote }}
  ## Server Configuration for Multiple-Sync fetch timeout
  STARHUB_SERVER_GIT_OPERATION_TIMEOUT: "120"
  {{- if $serverSvc.multiSync.proxy }}
  STARHUB_SERVER_PROXY_ENABLE: "true"
  STARHUB_SERVER_PROXY_URL: {{ $serverSvc.multiSync.proxy | quote }}
  {{- end }}
  {{- $mirrorSvc := include "common.service" (dict "ctx" . "service" "mirror") | fromYaml }}
  {{- $mirrorSvcName := include "common.names.custom" (list . $mirrorSvc.name) }}
  STARHUB_SERVER_LFS_SYNC_HOST: {{ printf "http://%s" $mirrorSvcName | quote }}
  STARHUB_SERVER_LFS_SYNC_PORT: {{ $mirrorSvc | dig "service" "port" 8092 | quote }}

  ## Server Configuration for Redis
  STARHUB_SERVER_REDIS_ENDPOINT: {{ printf "%s:%v" $serverRedisConfig.host $serverRedisConfig.port | quote }}
  {{- if or (and .Values.global.redis.enabled .Values.redis.requirePass) (and (not .Values.global.redis.enabled) $serverRedisConfig.password) }}
  STARHUB_SERVER_REDIS_PASSWORD: {{ $serverRedisConfig.password | quote }}
  {{- end }}

  ## Server Configuration for PostgreSQL
  STARHUB_DATABASE_DSN: {{ include "csghub.postgresql.dsn" (dict "ctx" . "service" $serverSvc) | quote }}

  ## Server Configuration for Object Storage
  STARHUB_SERVER_S3_ENDPOINT: {{ $serverS3Config.externalEndpoint | trimPrefix "http://" | trimPrefix "https://" | quote }}
  STARHUB_SERVER_S3_ACCESS_KEY_ID: {{ $serverS3Config.accessKey | quote }}
  STARHUB_SERVER_S3_ACCESS_KEY_SECRET: {{ $serverS3Config.secretKey | quote }}
  STARHUB_SERVER_S3_BUCKET: {{ $serverS3Config.bucket | quote }}
  STARHUB_SERVER_S3_REGION: {{ $serverS3Config.region | quote }}
  STARHUB_SERVER_S3_ENABLE_SSL: {{ $serverS3Config.secure | quote }}
  STARHUB_SERVER_S3_BUCKET_LOOKUP: {{ ternary "path" "auto" (eq $serverS3Config.pathStyle "true") | quote }}

  ## Server Configuration for Gitaly
  STARHUB_SERVER_GITSERVER_TYPE: "gitaly"
  STARHUB_SERVER_GITALY_SERVER_SOCKET: {{ printf "%s://%s:%v" $serverGitConfig.scheme $serverGitConfig.host $serverGitConfig.port | quote }}
  STARHUB_SERVER_GITALY_TOKEN: {{ $serverGitConfig.token | quote }}
  STARHUB_SERVER_GITALY_STORAGE: {{ $serverGitConfig.storage | quote }}
  {{- $domain := include "common.domain.csghub" . }}
  {{- $defaultPort := ternary "30022" "22" (eq (dig "service" "type" "LoadBalancer" .Values.global.gateway) "NodePort") }}
  {{- $port := $serverSvc.gitlabShell.sshPort | default $defaultPort }}
  STARHUB_SERVER_SSH_DOMAIN: {{ ternary (printf "git@%s" $domain) (printf "ssh://git@%s:%s" $domain $port) (eq $port "22") | quote }}

  ## Server Configuration for Space Application
  STARHUB_SERVER_PUBLIC_DOMAIN: {{ include "common.endpoint.csghub" . | quote }}
  {{- $rproxySvc := include "common.service" (dict "ctx" . "service" "rproxy") | fromYaml }}
  {{- $rproxyPort := dig "service" "port" 8083 $rproxySvc }}
  STARHUB_SERVER_INTERNAL_ROOT_DOMAIN: {{ printf "%s.app.internal:%v" (include "namespace.spaces" .) $rproxyPort | quote }}
  {{- $endpoint := include "common.endpoint.public" . | trimPrefix "http://" | trimPrefix "https://" }}
  STARHUB_SERVER_PUBLIC_ROOT_DOMAIN: {{ ternary $endpoint "" $runnerSvc.space.usePublicDomain | quote }}
  STARHUB_SERVER_SPACE_PYPI_INDEX_URL: {{ $runnerSvc.space.pipIndexUrl | quote }}
  STARHUB_SERVER_SPACE_DEPLOY_TIMEOUT_IN_MINUTES: {{ $runnerSvc.space.deployTimeoutInMin | default 30 | quote }}
  STARHUB_SERVER_SPACE_STATUS_CHECK_INTERVAL: {{ $runnerSvc.space.statusCheckInterval | default 10 | quote }}
  {{- $typeLabel := $runnerSvc.space.gpuModelLabel.typeLabel }}
  {{- $capacityLabel := $runnerSvc.space.gpuModelLabel.capacityLabel }}
  STARHUB_SERVER_GPU_MODEL_LABEL: '[{"type_label": {{ $typeLabel | quote }}, "capacity_label": {{ $capacityLabel | quote }}}]'
  {{- $sessionToken := dig "STARHUB_SERVER_SPACE_SESSION_SECRET_KEY" (randNumeric 8 | sha1sum) $data }}
  STARHUB_SERVER_SPACE_SESSION_SECRET_KEY: {{ $sessionToken | quote }}

  ## Server Configuration for Casdoor
  STARHUB_SERVER_CASDOOR_CERTIFICATE: "/starhub-bin/casdoor/tls.crt"
  STARHUB_SERVER_CASDOOR_CLIENT_ID: {{ $casdoorClientID | quote }}
  STARHUB_SERVER_CASDOOR_CLIENT_SECRET: {{ $casdoorClientSecret | quote }}
  STARHUB_SERVER_CASDOOR_ENDPOINT: {{ include "common.endpoint.casdoor" . | quote }}
  STARHUB_SERVER_CASDOOR_ORGANIZATION_NAME: "OpenCSG"
  STARHUB_SERVER_CASDOOR_APPLICATION_NAME: "CSGHub"

  ## Server Configuration for Tracing logging
  {{- $tempoSvc := include "common.service" (dict "ctx" . "service" "tempo") | fromYaml }}
  {{- $tempoHost := include "common.names.custom" (list . "tempo") }}
  {{- if $tempoSvc.enabled }}
  OPENCSG_TRACING_OTLP_ENDPOINT: {{ ternary (printf "http://%s:4317" $tempoHost) "" $tempoSvc.enabled | quote }}
  {{- end }}
  OPENCSG_TRACING_OTLP_LOGGING: {{ $tempoSvc.enabled | quote }}

  ## Server Configuration for Swagger API
  STARHUB_SERVER_ENABLE_SWAGGER: {{ $serverSvc.swaggerAPI.enabled | quote }}

  ## Server Configuration for Prometheus
  {{- $promeSvc := include "common.service" (dict "ctx" . "service" "prometheus") | fromYaml }}
  {{- if $promeSvc.enabled }}
  {{- $promeHost := include "common.names.custom" (list . "prometheus-server") }}
  {{- $promePort := dig "service" "port" 80 $promeSvc }}
  STARHUB_SERVER_PROMETHEUS_API_ADDRESS: {{ printf "http://%s:%v/api/v1/query" $promeHost $promePort | quote }}
  {{- with $promeSvc.gateway.basicAuth }}
  STARHUB_SERVER_PROMETHEUS_BASIC_AUTH: {{ printf "%s:%s" .username .password | b64enc | quote }}
  {{- end }}
  {{- end }}

  ## Server Configuration for Loki
  {{- $lokiSvc := include "common.service" (dict "ctx" . "service" "loki") | fromYaml }}
  {{- $lokiSvcName := include "common.names.custom" (list . $lokiSvc.name) }}
  {{- $lokiSvcPort := dig "service" "port" 3100 $lokiSvc }}
  STARHUB_SERVER_LOGCOLLECTOR_LOKI_URL: {{ printf "http://%s:%v" $lokiSvcName $lokiSvcPort | quote }}

  ## Server Configuration for Agent
  {{- if (dig "enabled" true .Values.agentichub) }}
  OPENCSG_AGENT_AUTOHUB_SERVICE_HOST: ""
  {{- $agenticflowSvc := include "common.service" (dict "ctx" . "service" "agenticflow") | fromYaml }}
  {{- $agenticflowSvcName := include "common.names.custom" (list . $agenticflowSvc.name) }}
  {{- $agenticflowHost := or $serverSvc.agenticflow.host (include "common.endpoint.agenticflow" .) }}
  CSGHUB_PORTAL_LANGFLOW_HOST: {{ $agenticflowHost | quote }}
  OPENCSG_AGENT_AGENTHUB_SERVICE_HOST: {{ $agenticflowHost | quote }}
  {{- $agenticflowData := (lookup "v1" "ConfigMap" .Release.Namespace $agenticflowSvcName).data | default dict }}
  {{- $agenticflowToken := dig "FLOWS_ACCESS_TOKEN" "" $agenticflowData | default (include "agenticflow.api.token" .) }}
  OPENCSG_AGENT_AGENTHUB_SERVICE_TOKEN: {{ or $serverSvc.agenticflow.token $agenticflowToken | quote }}
  STARHUB_SERVER_AGENT_CODE_INSTANCE_QUOTA_PER_USER: {{ $serverSvc.agenticflow.codeInstanceQuotaPerUser | default 5 | quote }}
  STARHUB_SERVER_AGENT_LANGFLOW_INSTANCE_QUOTA_PER_USER: {{ $serverSvc.agenticflow.instanceQuotaPerUser | default 5 | quote }}

  ## Server Configuration for CSGBot
  {{- $csgbotSvc := include "common.service" (dict "ctx" . "service" "csgbot") | fromYaml }}
  {{- $csgbotSvcName := include "common.names.custom" (list . $csgbotSvc.name) }}
  {{- $csgbotSvcPort := dig "service" "port" 8070 $csgbotSvc }}
  OPENCSG_CSGBOT_SERVER_HOST: {{ or $serverSvc.csgbot.host (printf "http://%s" $csgbotSvcName) | quote }}
  OPENCSG_CSGBOT_SERVER_PORT: {{ or $serverSvc.csgbot.port $csgbotSvcPort | quote }}
  {{- end }}

  ## Server Configuration for XNet
  {{- $xnetSvc := include "common.service" (dict "ctx" . "service" "xnet") | fromYaml }}
  {{- $xnetSvcName := include "common.names.custom" (list . $xnetSvc.name) }}
  {{- $xnetSvcPort := dig "service" "port" 8097 $xnetSvc }}
  {{- $XNetData := (lookup "v1" "ConfigMap" .Release.Namespace $xnetSvcName).data | default dict }}
  {{- $xnetApiToken := dig "STARHUB_SERVER_API_TOKEN" (include "csghub.api.token" .) $XNetData }}
  STARHUB_SERVER_XNET_ENDPOINT: {{ $serverSvc.xnet.endpoint | default (printf "%s/xnet" (include "common.endpoint.csghub" .)) | quote }}
  STARHUB_SERVER_XNET_API_KEY: {{ $serverSvc.xnet.apiToken | default $xnetApiToken | quote }}

  ## Server Configuration for Memory Service
  {{- $memSvc := include "common.service" (dict "ctx" . "service" "memmachine") | fromYaml }}
  {{- $memConfig := $serverSvc.memory | default dict }}
  {{- $memEnabled := gt (len $memConfig) 0 }}
  OPENCSG_MEMORY_SERVER_ENABLED: {{ ternary "true" "false" $memEnabled | quote }}
  OPENCSG_MEMORY_SERVER_HOST: {{ printf "http://%s" (include "common.names.custom" (list . $memSvc.name)) | quote }}
  OPENCSG_MEMORY_SERVER_PORT: {{ $memSvc | dig "service" "port" 8080 | quote }}
  OPENCSG_MEMORY_SERVER_BASE_PATH: {{ $serverSvc.memory.basePath | quote }}
  OPENCSG_MEMORY_SERVER_API_KEY: {{ $serverSvc.memory.apiKey | quote }}
  OPENCSG_MEMORY_SERVER_TIMEOUT_SECONDS: {{ $serverSvc.memory.timeoutSeconds | quote }}
  OPENCSG_MEMORY_SERVER_RETRY_COUNT: {{ $serverSvc.memory.retryCount | quote }}
  OPENCSG_MEMORY_SERVER_RETRY_DELAY_MILLIS: {{ $serverSvc.memory.retryDelayMillis | quote }}

  ## Server Configuration for S3 Proxy
  STARHUB_SERVER_STORAGE_GATEWAY_ENABLE_PRESIGNED_URL_PROXY: {{ $serverSvc.enablePresignedUrlProxy | quote }}

  ## Cluster Scheduling Configuration
  STARHUB_SERVER_CLUSTER_ALLOW_CPU_RESOURCE_SCHEDULE_TO_GPU_NODE: {{ $serverSvc.allowCpuOnGpuNodes | quote }}

  ## Define default error redirect URL
  STARHUB_SERVER_FAIL_REDIRECT_URL: {{ printf "%s/errors/server-error" (include "common.endpoint.csghub" .) }}
  ## Additional environments for all csghub deployments
  {{- range $key, $value := .Values.environments }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
