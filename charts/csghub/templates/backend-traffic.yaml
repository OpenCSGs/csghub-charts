{{- $gateway := .Values.global.gateway }}
{{- if regexMatch "envoyproxy" $gateway.controllerName }}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "common.names.custom" (list . "custom-error-pages") }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/service: "custom-error-pages"
    {{- include "common.labels" . | nindent 4 }}
spec:
  {{- $service := include "common.service" (dict "ctx" . "service" "portal") | fromYaml }}
  {{- $serviceName := include "common.names.custom" (list . $service.name) }}
  targetSelectors:
    - kind: HTTPRoute
      matchLabels:
        {{- include "common.labels" . | nindent 8 }}
  responseOverride:
  {{- range $path, $_ := .Files.Glob "html/*.html" }}
  {{- $filename := base $path }}
  {{- $code := trimSuffix ".html" $filename }}
    - match:
        statusCodes:
          - type: Value
            value: {{ $code }}
      response:
        contentType: text/html; charset=UTF-8
        body:
          type: ValueRef
          valueRef:
            group: ""
            kind: ConfigMap
            name: {{ include "common.names.custom" (list $ (printf "custom-error-%s" $code)) }}
  {{- end }}
{{- end }}
