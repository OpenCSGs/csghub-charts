suite: Test LLMLog Resources
templates:
  - csghub/llmlog/deployment.yaml
release:
  name: csghub
  namespace: csghub
set:
  global:
    edition: "ee"
    gateway:
      external:
        domain: "csghub.example.com"
    image:
      registry: "docker.io"
      pullPolicy: "Never"
      pullSecrets: ["acr-pull-secret"]
  image:
    registry: "docker.io"
    repository: "opencsghq/csghub-server"
    tag: "v2.2.0"
    pullPolicy: "Never"
  aigateway:
    aigateway:
      llmlogEnabled: true
  logging:
    level: "info"
tests:
  - it: Should render deployment when llmlogEnabled is true
    template: csghub/llmlog/deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-llmlog"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "llmlog"
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/service"]
          value: "llmlog"
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/service"]
          value: "llmlog"
      - equal:
          path: metadata.annotations["reloader.stakater.com/auto"]
          value: "true"
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: "acr-pull-secret"
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/opencsghq/csghub-server:v2.2.0-ee"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "Never"
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["/starhub-bin/starhub", "llmlog", "launch", "-l", "info"]
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: csghub-core
      - notExists:
          path: spec.template.spec.containers[0].ports

  - it: Should render deployment with custom config
    template: csghub/llmlog/deployment.yaml
    set:
      aigateway:
        aigateway:
          llmlogEnabled: true
      llmlog:
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        nodeSelector:
          diskType: ssd
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.nodeSelector.diskType
          value: "ssd"

  - it: Should not render deployment when llmlogEnabled is false
    template: csghub/llmlog/deployment.yaml
    set:
      aigateway:
        aigateway:
          llmlogEnabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not render deployment when edition is not ee
    template: csghub/llmlog/deployment.yaml
    set:
      global:
        edition: "ce"
    asserts:
      - hasDocuments:
          count: 0
