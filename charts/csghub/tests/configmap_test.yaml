suite: Test Core ConfigMap
templates:
  - csghub/configmap.yaml
release:
  name: csghub
  namespace: csghub
set:
  global:
    edition: "ee"
    gateway:
      external:
        domain: "csghub.example.com"
        useTop: false
      tls:
        enabled: true
        secretName: "test-tls"
    image:
      registry: "acr.io"
      pullPolicy: "Never"
      pullSecrets: ["acr-pull-secret"]
    registry:
      enabled: true
    objectStore:
      enabled: true
  portal:
    name: "portal-svc"
    service:
      port: "8080"
  server:
    name: "server-svc"
    service:
      port: "8070"
  runner:
    name: "runner-svc"
    namespace: "spaces"
    interval: 30
    region: "cn-north-1"
    usePublicDomain: true
    model:
      deployTimeout: "120"
      registry: "model.io"
    service:
      port: 8072
    gpuModelLabel:
      typeLabel: "nvidia.com/gpu.product"
      capacityLabel: "nvidia.com/gpu"
  accounting:
    name: "accounting-svc"
  user:
    name: "user-svc"
  loki:
    name: "loki-svc"
  tempo:
    enabled: true
  registry:
    name: "registry"
  minio:
    name: "minio"
  postgresql:
    name: "postgresql"
  nats:
    name: "nats"
  prometheus:
    enabled: true
tests:
  - it: Should render ConfigMap correctly
    template: csghub/configmap.yaml
    asserts:
      - equal:
          path: metadata.name
          value: "csghub-core"
      - equal:
          path: metadata.labels["app.kubernetes.io/service"]
          value: "core"
      - equal:
          path: data.CSGHUB_PORTAL_ENABLE_HTTPS
          value: "true"
      - equal:
          path: data.CSGHUB_PORTAL_ON_PREMISE
          value: "true"
      - equal:
          path: data.CSGHUB_PORTAL_STARHUB_BASE_URL
          value: "https://csghub.example.com"
      - matchRegex:
          path: data.CSGHUB_PORTAL_STARHUB_API_KEY
          pattern: ".{128}"
      - matchRegex:
          path: data.CSGHUB_PORTAL_LOGIN_URL
          pattern: "https://casdoor.example.com/.*\\?client_id=[0-9a-z]{20}&response_type=code&redirect_uri=https://csghub.example.com/.*"
      - matchRegex:
          path: data.CSGHUB_PORTAL_DATABASE_DSN
          pattern: "postgresql://csghub:.*csghub-postgresql:5432/csghub_portal_svc\\?sslmode=disable"
      - equal:
          path: data.CSGHUB_PORTAL_S3_ENDPOINT
          value: "minio.example.com"
      - equal:
          path: data.CSGHUB_PORTAL_S3_ACCESS_KEY_ID
          value: "minio"
      - equal:
          path: data.CSGHUB_PORTAL_S3_BUCKET
          value: "csghub-portal-svc-public"
      - equal:
          path: data.CSGHUB_PORTAL_S3_ENABLE_SSL
          value: "true"
      - equal:
          path: data.CSGHUB_PORTAL_PRIVATE_S3_BUCKET
          value: "csghub-portal-svc"
      - equal:
          path: data.CSGHUB_PORTAL_REDIS_ADDR
          value: "csghub-redis:6379"
      - matchRegex:
          path: data.OPENCSG_ACCOUNTING_NATS_URL
          pattern: "nats://natsadmin:.*@csghub-nats:4222"
      - equal:
          path: data.OPENCSG_USER_SERVER_SIGNIN_SUCCESS_REDIRECT_URL
          value: "https://csghub.example.com/server/callback"
      - equal:
          path: data.STARHUB_SERVER_MODEL_DOWNLOAD_ENDPOINT
          value: "https://csghub.example.com"
      - equal:
          path: data.STARHUB_SERVER_MODEL_DEPLOY_TIMEOUT_IN_MINUTES
          value: "120"
      - equal:
          path: data.STARHUB_SERVER_MODEL_DOCKER_REG_BASE
          value: "model.io"
      - matchRegex:
          path: data.STARHUB_DATABASE_DSN
          pattern: "postgresql://csghub:.*csghub-postgresql:5432/csghub_server_svc\\?sslmode=disable"
      - equal:
          path: data.STARHUB_SERVER_S3_BUCKET
          value: "csghub-server-svc"
      - matchRegex:
          path: data.STARHUB_SERVER_GITALY_SERVER_SOCKET
          pattern: "tcp://csghub-gitaly:8075"
      - equal:
          path: data.STARHUB_SERVER_SSH_DOMAIN
          value: "git@csghub.example.com"
      - equal:
          path: data.STARHUB_SERVER_PUBLIC_DOMAIN
          value: "https://csghub.example.com"
      - matchRegex:
          path: data.STARHUB_SERVER_INTERNAL_ROOT_DOMAIN
          pattern: "spaces.app.internal.*"
      - equal:
          path: data.STARHUB_SERVER_CASDOOR_CERTIFICATE
          value: "/starhub-bin/casdoor/tls.crt"
      - matchRegex:
          path: data.STARHUB_SERVER_CASDOOR_CLIENT_ID
          pattern: "[0-9a-z]{20}"
      - matchRegex:
          path: data.STARHUB_SERVER_CASDOOR_CLIENT_SECRET
          pattern: "[0-9a-z]{40}"
      - equal:
          path: data.STARHUB_SERVER_CASDOOR_ENDPOINT
          value: "https://casdoor.example.com"
      - equal:
          path: data.STARHUB_SERVER_PROMETHEUS_API_ADDRESS
          value: "http://csghub-prometheus-server:80/api/v1/query"
      - equal:
          path: data.CSGHUB_PORTAL_AI_GATEWAY_HOST
          value: "https://csghub.example.com/aigateway"
      - equal:
          path: data.OPENCSG_AIGATEWAY_PORT
          value: "8094"
      - equal:
          path: data.OPENCSG_AIGATEWAY_LLMLOG_ENABLE
          value: "true"
      - equal:
          path: data.OPENCSG_LLMLOG_BUCKET
          value: "csghub-llmlog"
      - notExists:
          path: data.OPENCSG_FEDAP_SERVER_HOST
      - notExists:
          path: data.OPENCSG_TRUSTREGISTRY_SERVER_HOST
      - notExists:
          path: data.STARHUB_SERVER_FEDERATION_ADAPTER_ENDPOINT
      - notExists:
          path: data.STARHUB_SERVER_FEDERATION_REGISTRY_HOST

  - it: Should render sensitive check defaults when moderation is enabled
    template: csghub/configmap.yaml
    set:
      aigateway:
        moderation:
          enabled: true
    asserts:
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ENABLE
          value: "true"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_CHECK_CHAIN
          value: "ac_automaton,mutable_ac_automaton,aliyun_green"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_STREAM_CHECK_MODE
          value: "async"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ASYNC_BUFFER_MAX_CHARS
          value: "50"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_MAX_CONTENT_LENGTH
          value: "2000"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_ENABLE
          value: "false"
      - matchRegex:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_ENDPOINT
          pattern: "https://.*/aigateway"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_API_KEY
          value: ""
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_MODEL
          value: "Qwen/Qwen3Guard-Gen-0.6B"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_STREAM_MODEL
          value: "Qwen/Qwen3Guard-Gen-Stream-0.6B"

  - it: Should render sensitive check with custom moderation config
    template: csghub/configmap.yaml
    set:
      aigateway:
        moderation:
          enabled: true
          endpoint: "https://moderation.custom.com"
          accessKeyId: "custom-key"
          accessKeySecret: "custom-secret"
          region: "us-east-1"
          enableSSL: false
          checkChain: "custom_chain"
          streamCheckMode: "sync"
          asyncBufferMaxChars: 100
          maxContentLength: 5000
    asserts:
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ENDPOINT
          value: "https://moderation.custom.com"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ACCESS_KEY_ID
          value: "custom-key"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ACCESS_KEY_SECRET
          value: "custom-secret"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_REGION
          value: "us-east-1"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ENABLE_SSL
          value: "false"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_CHECK_CHAIN
          value: "custom_chain"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_STREAM_CHECK_MODE
          value: "sync"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_ASYNC_BUFFER_MAX_CHARS
          value: "100"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_MAX_CONTENT_LENGTH
          value: "5000"

  - it: Should render sensitive check with LLM moderation enabled
    template: csghub/configmap.yaml
    set:
      aigateway:
        moderation:
          enabled: true
          llm:
            enabled: true
            endpoint: "https://llm.custom.com"
            apiKey: "llm-api-key-12345"
            guardModel: "custom/guard-model"
            guardStreamModel: "custom/guard-stream-model"
    asserts:
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_ENABLE
          value: "true"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_ENDPOINT
          value: "https://llm.custom.com"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_API_KEY
          value: "llm-api-key-12345"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_MODEL
          value: "custom/guard-model"
      - equal:
          path: data.STARHUB_SERVER_SENSITIVE_CHECK_LLM_GUARD_STREAM_MODEL
          value: "custom/guard-stream-model"

  - it: Should render aigateway with independent domain when useDomain=true
    template: csghub/configmap.yaml
    set:
      global:
        gateway:
          external:
            aigateway:
              useDomain: true
    asserts:
      - equal:
          path: data.CSGHUB_PORTAL_AI_GATEWAY_HOST
          value: "https://aigateway.example.com"

  - it: Should render llmlog config when aigateway llmlogEnabled is set
    template: csghub/configmap.yaml
    set:
      aigateway:
        aigateway:
          llmlogEnabled: true
    asserts:
      - equal:
          path: data.OPENCSG_AIGATEWAY_LLMLOG_ENABLE
          value: "true"
      - equal:
          path: data.OPENCSG_LLMLOG_BUCKET
          value: "csghub-llmlog"
      - equal:
          path: data.OPENCSG_LLMLOG_PREFIX
          value: "llmlog"
      - equal:
          path: data.OPENCSG_LLMLOG_WORKER_NUM
          value: "10"
      - equal:
          path: data.OPENCSG_LLMLOG_BATCH_SIZE
          value: "1000"
      - equal:
          path: data.OPENCSG_LLMLOG_FLUSH_INTERVAL_SECONDS
          value: "300"

  - it: Should not render llmlog config when aigateway llmlogEnabled is false
    template: csghub/configmap.yaml
    set:
      aigateway:
        aigateway:
          llmlogEnabled: false
    asserts:
      - equal:
          path: data.OPENCSG_AIGATEWAY_LLMLOG_ENABLE
          value: "false"
      - notExists:
          path: data.OPENCSG_LLMLOG_BUCKET
      - notExists:
          path: data.OPENCSG_LLMLOG_PREFIX
      - notExists:
          path: data.OPENCSG_LLMLOG_WORKER_NUM
      - notExists:
          path: data.OPENCSG_LLMLOG_BATCH_SIZE
      - notExists:
          path: data.OPENCSG_LLMLOG_FLUSH_INTERVAL_SECONDS

  - it: Should render federation adapter config in saas mode
    template: csghub/configmap.yaml
    set:
      global:
        edition: "saas"
    asserts:
      - equal:
          path: data.STARHUB_SERVER_FEDERATION_ADAPTER_ENDPOINT
          value: "http://csghub-fedap"
      - equal:
          path: data.STARHUB_SERVER_FEDERATION_ADAPTER_PORT
          value: "8099"
      - equal:
          path: data.STARHUB_SERVER_FEDERATION_REGISTRY_HOST
          value: "http://csghub-trustregistry"
      - equal:
          path: data.STARHUB_SERVER_FEDERATION_REGISTRY_PORT
          value: "8098"

  - it: Should not render federation adapter when disabled in saas mode
    template: csghub/configmap.yaml
    set:
      global:
        edition: "saas"
      fedap:
        enabled: false
    asserts:
      - notExists:
          path: data.STARHUB_SERVER_FEDERATION_ADAPTER_ENDPOINT
      - notExists:
          path: data.STARHUB_SERVER_FEDERATION_ADAPTER_PORT

  - it: Should not render federation registry when disabled in saas mode
    template: csghub/configmap.yaml
    set:
      global:
        edition: "saas"
      trustregistry:
        enabled: false
    asserts:
      - notExists:
          path: data.STARHUB_SERVER_FEDERATION_REGISTRY_HOST
      - notExists:
          path: data.STARHUB_SERVER_FEDERATION_REGISTRY_PORT

  - it: Should not render llmlog config when edition is ce
    template: csghub/configmap.yaml
    set:
      global:
        edition: "ce"
    asserts:
      - equal:
          path: data.OPENCSG_AIGATEWAY_LLMLOG_ENABLE
          value: "false"
      - notExists:
          path: data.OPENCSG_LLMLOG_BUCKET

  - it: Should render aigateway with custom domain when domain is set
    template: csghub/configmap.yaml
    set:
      global:
        gateway:
          external:
            aigateway:
              domain: "ai.custom.com"
    asserts:
      - equal:
          path: data.CSGHUB_PORTAL_AI_GATEWAY_HOST
          value: "https://ai.custom.com"

  - it: Custom domain should take precedence over useDomain
    template: csghub/configmap.yaml
    set:
      global:
        gateway:
          external:
            aigateway:
              domain: "ai.custom.com"
              useDomain: true
    asserts:
      - equal:
          path: data.CSGHUB_PORTAL_AI_GATEWAY_HOST
          value: "https://ai.custom.com"

  - it: Should render ConfigMap correctly
    template: csghub/configmap.yaml
    set:
      global:
        registry:
          enabled: false
          external:
            registry: "registry.io"
            repository: "test"
            insecure: "false"
        objectStore:
          enabled: false
          external:
            endpoint: "https://s4.example.com"
            accessKey: "testUser"
            secretKey: "testPassword"
            bucket: "csghub-eva"
            region: "es-west-1"
            encrypt: "false"
            secure: "false"
            pathStyle: "false"
      runner:
        usePublicDomain: false
    asserts:
      - equal:
          path: data.STARHUB_SERVER_PUBLIC_ROOT_DOMAIN
          value: ""
      - equal:
          path: data.STARHUB_SERVER_S3_ACCESS_KEY_ID
          value: "testUser"
      - equal:
          path: data.STARHUB_SERVER_S3_ACCESS_KEY_SECRET
          value: "testPassword"
      - equal:
          path: data.STARHUB_SERVER_S3_ENDPOINT
          value: "s4.example.com"
      - equal:
          path: data.STARHUB_SERVER_S3_BUCKET
          value: "csghub-eva"
      - equal:
          path: data.STARHUB_SERVER_S3_REGION
          value: "es-west-1"
      - equal:
          path: data.STARHUB_SERVER_S3_ENABLE_SSL
          value: "false"
      - equal:
          path: data.STARHUB_SERVER_S3_BUCKET_LOOKUP
          value: "auto"

  - it: Should render ConfigMap correctly
    template: csghub/configmap.yaml
    set:
      global:
        gateway:
          external:
            useTop: true
    asserts:
      - equal:
          path: data.CSGHUB_PORTAL_STARHUB_BASE_URL
          value: "https://csghub.example.com"
      - matchRegex:
          path: data.CSGHUB_PORTAL_LOGIN_URL
          pattern: "https://casdoor.csghub.example.com/.*\\?client_id=[0-9a-z]{20}&response_type=code&redirect_uri=https://csghub.example.com/.*"
      - equal:
          path: data.CSGHUB_PORTAL_S3_ENDPOINT
          value: "minio.csghub.example.com"
      - equal:
          path: data.OPENCSG_USER_SERVER_SIGNIN_SUCCESS_REDIRECT_URL
          value: "https://csghub.example.com/server/callback"
      - equal:
          path: data.STARHUB_SERVER_MODEL_DOWNLOAD_ENDPOINT
          value: "https://csghub.example.com"
      - equal:
          path: data.STARHUB_SERVER_SSH_DOMAIN
          value: "git@csghub.example.com"
      - equal:
          path: data.STARHUB_SERVER_PUBLIC_DOMAIN
          value: "https://csghub.example.com"
      - equal:
          path: data.STARHUB_SERVER_CASDOOR_ENDPOINT
          value: "https://casdoor.csghub.example.com"
